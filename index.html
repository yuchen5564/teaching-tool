<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops, There's Nothing Here...</title>
    <!-- 引入 Tailwind CSS 以進行快速佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google 字體以增加極簡無襯線感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* 自定義字體與動畫 */
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #0a0a0a;
            color: #ededed;
        }

        .fade-in-up {
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 0.9s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 讀取中的小圓點動畫 */
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(255,255,255,0); text-shadow: .25em 0 0 rgba(255,255,255,0), .5em 0 0 rgba(255,255,255,0); }
            40% { color: #666; text-shadow: .25em 0 0 rgba(255,255,255,0), .5em 0 0 rgba(255,255,255,0); }
            60% { text-shadow: .25em 0 0 #666, .5em 0 0 rgba(255,255,255,0); }
            80%, 100% { text-shadow: .25em 0 0 #666, .5em 0 0 #666; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-gray-700 selection:text-white">

    <main class="w-full text-center flex flex-col items-center px-4">
        <!-- 主標題 (強制不換行 whitespace-nowrap，並進一步調低響應式大小以防超出版面) -->
        <h1 class="text-[4.5vw] sm:text-3xl md:text-4xl lg:text-5xl font-light tracking-wide mb-8 fade-in-up whitespace-nowrap">
            Oops, There's Nothing Here...
        </h1>

        <!-- 裝飾分隔線 -->
        <div class="h-px w-16 bg-gray-700 mb-8 fade-in-up delay-1"></div>

        <!-- 副標題與狀態 -->
        <div class="text-gray-400 font-light tracking-widest mb-12 fade-in-up delay-2">
            <p class="mb-2">Find More?<span class="loading-dots"></span></p>
        </div>

        <!-- 倒數計時與跳轉區域 -->
        <div class="flex flex-col items-center gap-4 fade-in-up delay-3">
            <div class="text-sm text-gray-500 flex items-center justify-center gap-2">
                <svg class="w-4 h-4 animate-spin text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>將在 <span id="countdown" class="font-medium text-gray-200 mx-1">10</span> 秒後自動跳轉</span>
            </div>
            
            <!-- 手動跳轉按鈕 -->
            <a href="https://www.merlinkuo.tw" 
               class="mt-4 px-6 py-2 border border-gray-700 text-gray-400 rounded-full text-sm font-light tracking-wider hover:bg-gray-800 hover:text-gray-100 transition-all duration-300">
                立即前往
            </a>
        </div>
    </main>

    <script>
        // 設定目標網址與倒數秒數
        const targetUrl = "https://www.merlinkuo.tw";
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');

        // 每秒更新一次倒數計時
        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            // 當倒數結束時，執行跳轉並清除計時器
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = targetUrl;
            }
        }, 1000); // 1000 毫秒 = 1 秒
    </script>
</body>
</html>
